name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'
      - 'PROMPT.md'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 编译 Aurora APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 生成 Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo ">> Downloading Gradle 8.2..."
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          fi

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      - name: 提取版本号
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo ">> 版本号: v$VERSION"

      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      - name: 检查编译产物
        run: |
          echo ">> 编译产物列表:"
          find app/build/outputs/apk/release/ -name "*.apk" -exec ls -lh {} \;

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          compression-level: 0